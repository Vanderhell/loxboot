name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # Gate: all 5 CI targets must pass before release artifacts are built
  # -------------------------------------------------------------------------
  gate:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Ubuntu GCC
            os: ubuntu-latest
            compiler: gcc
          - name: Ubuntu Clang
            os: ubuntu-latest
            compiler: clang
          - name: Ubuntu ARM cross-compile
            os: ubuntu-latest
            compiler: gcc-arm
          - name: Windows MSVC
            os: windows-latest
            compiler: msvc
          - name: Windows ClangCL
            os: windows-latest
            compiler: clang-cl

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM cross-compiler
        if: matrix.compiler == 'gcc-arm'
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: Configure (Ubuntu GCC)
        if: matrix.compiler == 'gcc'
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Wpedantic -Werror" \
            -DLOXBOOT_BUILD_TESTS=ON \
            -DLOXBOOT_BUILD_UART_PORT=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Ubuntu Clang)
        if: matrix.compiler == 'clang'
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Wpedantic -Werror" \
            -DLOXBOOT_BUILD_TESTS=ON \
            -DLOXBOOT_BUILD_UART_PORT=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure (ARM cross-compile)
        if: matrix.compiler == 'gcc-arm'
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$(pwd)/cmake/toolchain-arm-none-eabi.cmake" \
            -DLOXBOOT_BUILD_TESTS=OFF \
            -DLOXBOOT_BUILD_UART_PORT=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows MSVC)
        if: matrix.compiler == 'msvc'
        run: |
          cmake -B build `
            -DCMAKE_C_FLAGS="/W4 /WX" `
            -DLOXBOOT_BUILD_TESTS=ON `
            -DLOXBOOT_BUILD_UART_PORT=ON

      - name: Configure (Windows ClangCL)
        if: matrix.compiler == 'clang-cl'
        run: |
          cmake -B build `
            -T ClangCL `
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror" `
            -DLOXBOOT_BUILD_TESTS=ON `
            -DLOXBOOT_BUILD_UART_PORT=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        if: matrix.compiler != 'gcc-arm'
        run: ctest --test-dir build -C Release --output-on-failure

  # -------------------------------------------------------------------------
  # Package (Linux): source archive + header bundle
  # -------------------------------------------------------------------------
  package-linux:
    name: Package source + headers
    runs-on: ubuntu-latest
    needs: gate

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches loxboot_version.h
        run: |
          TAG_VER="${{ steps.ver.outputs.version }}"
          HDR_VER=$(grep 'LOXBOOT_VERSION_STRING' include/loxboot/loxboot_version.h \
                    | grep -oP '"[^"]+"' | tr -d '"')
          if [ "$TAG_VER" != "$HDR_VER" ]; then
            echo "ERROR: tag $TAG_VER != loxboot_version.h $HDR_VER"
            exit 1
          fi
          echo "Version verified: $TAG_VER"

      - name: Build source archive
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          git archive --format=tar.gz \
            --prefix="loxboot-${VERSION}/" \
            -o "loxboot-${VERSION}.tar.gz" \
            HEAD

      - name: Build header-only bundle
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BUNDLE="loxboot-${VERSION}-headers"
          mkdir -p "${BUNDLE}/loxboot"
          cp include/loxboot/*.h "${BUNDLE}/loxboot/"
          cp LICENSE README.md CHANGELOG.md KNOWN_ISSUES.md "${BUNDLE}/"
          tar -czf "${BUNDLE}.tar.gz" "${BUNDLE}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-${{ steps.ver.outputs.version }}
          path: loxboot-*.tar.gz

  # -------------------------------------------------------------------------
  # Package (Windows): pre-built MSVC static library
  # -------------------------------------------------------------------------
  package-windows:
    name: Package Windows MSVC lib
    runs-on: windows-latest
    needs: gate

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_C_FLAGS="/W4 /WX" `
            -DLOXBOOT_BUILD_TESTS=OFF `
            -DLOXBOOT_BUILD_UART_PORT=ON `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Assemble bundle
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BUNDLE="loxboot-${VERSION}-windows-msvc"
          mkdir -p "${BUNDLE}/lib" "${BUNDLE}/include/loxboot"

          cp build/Release/loxboot.lib   "${BUNDLE}/lib/"
          cp include/loxboot/*.h         "${BUNDLE}/include/loxboot/"
          cp LICENSE README.md CHANGELOG.md KNOWN_ISSUES.md "${BUNDLE}/"

          cat > "${BUNDLE}/USAGE.txt" <<'EOF'
          loxboot Windows MSVC static library
          ====================================
          Link: loxboot.lib
          Include path: include/
          Standard: C99 (/std:c11 or /std:c99)
          No runtime dependencies — zero-heap, no CRT heap functions used.
          EOF

          7z a "${BUNDLE}.zip" "${BUNDLE}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-${{ steps.ver.outputs.version }}
          path: loxboot-*-windows-msvc.zip

  # -------------------------------------------------------------------------
  # Publish: collect all artifacts, generate checksums, create GitHub Release
  # -------------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [package-linux, package-windows]

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: pkg-linux-${{ steps.ver.outputs.version }}
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: pkg-windows-${{ steps.ver.outputs.version }}
          path: dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > "loxboot-${{ steps.ver.outputs.version }}-SHA256SUMS.txt"
          cat "loxboot-${{ steps.ver.outputs.version }}-SHA256SUMS.txt"

      - name: Extract changelog section
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          awk "/^## \[v${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" \
            CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: loxboot v${{ steps.ver.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/loxboot-*.tar.gz
            dist/loxboot-*-windows-msvc.zip
            dist/loxboot-*-SHA256SUMS.txt
