name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: ubuntu-latest
            compiler: gcc-arm
            cc: arm-none-eabi-gcc
            profile: "ARM cross-compile (core only)"
          - os: windows-latest
            compiler: msvc
          - os: windows-latest
            compiler: clang-cl
            toolset: ClangCL

    steps:
      - uses: actions/checkout@v4

      - name: Configure (Ubuntu GCC)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'gcc'
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Wpedantic -Werror" \
            -DLOXBOOT_BUILD_TESTS=ON \
            -DLOXBOOT_BUILD_UART_PORT=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Ubuntu Clang)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'clang'
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Wpedantic -Werror" \
            -DLOXBOOT_BUILD_TESTS=ON \
            -DLOXBOOT_BUILD_UART_PORT=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows MSVC)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'msvc'
        run: |
          cmake -B build `
            -DCMAKE_C_FLAGS="/W4 /WX" `
            -DLOXBOOT_BUILD_TESTS=ON `
            -DLOXBOOT_BUILD_UART_PORT=ON

      - name: Configure (Windows ClangCL)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'clang-cl'
        run: |
          cmake -B build `
            -T ClangCL `
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror" `
            -DLOXBOOT_BUILD_TESTS=ON `
            -DLOXBOOT_BUILD_UART_PORT=ON

      - name: Install ARM cross-compiler
        if: matrix.compiler == 'gcc-arm'
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: Configure (ARM cross-compile)
        if: matrix.compiler == 'gcc-arm'
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$(pwd)/cmake/toolchain-arm-none-eabi.cmake" \
            -DLOXBOOT_BUILD_TESTS=OFF \
            -DLOXBOOT_BUILD_UART_PORT=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
